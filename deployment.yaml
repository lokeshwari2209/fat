apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-delivery
  template:
    metadata:
      labels:
        app: food-delivery
    spec:
      containers:
      - name: food-delivery
        image: lokeshwarik/food-delivery:latest
        ports:
        - containerPort: 8080